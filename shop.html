<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* TOP BANNER */

.topbar{
background:red;
color:white;
text-align:center;
padding:12px;
font-weight:bold;
font-size:18px;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
border-bottom:2px solid red;
}

.logo{
height:70px;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

/* PRODUCT GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

/* PRODUCT CARD */

.product{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
border:1px solid red;
}

.product img{
width:100%;
max-width:200px;
}

select{
margin-top:8px;
padding:6px;
width:80%;
}

button{
margin-top:10px;
padding:10px;
background:red;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
width:80%;
}

button:hover{
background:#ff3333;
}

</style>

</head>

function getSizeOptions(id){

return `

<select id="${id}">

<option>EES</option>

<option>ES</option>

<option>S</option>

<option>M</option>

<option>L</option>

<option>XL</option>

<option>XXL</option>

<option>3XL</option>

</select>

`

}


function addProduct(name, price, image, size){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({

name,

price,

image,

size

})

localStorage.setItem("cart", JSON.stringify(cart))

alert("Added to cart")

}

</script>
