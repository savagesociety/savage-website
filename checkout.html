<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savage Checkout</title>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>

<style>

body{
font-family:Arial;
background:black;
color:white;
margin:0;
}

header{
background:#111;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.checkout-container{

max-width:600px;

margin:40px auto;

background:#222;

padding:30px;

border-radius:12px;

}

input,select{

width:100%;

padding:12px;

margin-top:10px;

margin-bottom:20px;

border:none;

border-radius:6px;

}

button{

width:100%;

padding:15px;

background:red;

color:white;

font-size:18px;

border:none;

cursor:pointer;

border-radius:6px;

}

button:hover{

background:#cc0000;

}

.total-box{

margin-top:20px;

font-size:18px;

}

</style>

</head>


<body>


<header>

SAVAGE CHECKOUT

</header>



<div class="checkout-container">


<h2>Checkout</h2>


<form id="checkout-form">


<label>Email</label>

<input

type="email"

id="email"

placeholder="example@gmail.com"

required

>



<label>Delivery Address</label>

<input

type="text"

id="address"

placeholder="Enter delivery address"

required

>



<label>Select Delivery Option</label>


<select id="delivery" required>


<option value="">Select Option</option>


<option

value="Lagos Island"

data-fee="8000"

>

Lagos Island (+₦8,000)

</option>



<option

value="Lagos Mainland"

data-fee="6000"

>

Lagos Mainland (+₦6,000)

</option>



<option

value="Pickup"

data-fee="0"

>

Pick up at Isheri Estate Committee, Opic Harmony Villas

</option>


</select>



<div class="total-box">

<p id="deliveryFee">

Delivery Fee: ₦0

</p>


<p id="totalAmount">

Total Amount: ₦0

</p>

</div>



<button type="submit">

Pay Now

</button>


</form>


</div>



<script>


emailjs.init(

"33m-P9BS7popkD_uY"

);



let cart =

JSON.parse(

localStorage.getItem("cart")

) || [];


let cartTotal =

cart.reduce(

(sum,item)=>sum+item.price,

0

);



const deliverySelect =

document.getElementById("delivery");


const deliveryFeeText =

document.getElementById("deliveryFee");


const totalText =

document.getElementById("totalAmount");



function updateTotal(){


const selected =

deliverySelect.options[

deliverySelect.selectedIndex

];


const fee =

parseInt(

selected?.dataset.fee

)||0;



deliveryFeeText.innerText =

"Delivery Fee: ₦"+fee;



totalText.innerText =

"Total Amount: ₦"+(cartTotal+fee);


}



deliverySelect.addEventListener(

"change",

updateTotal

);



document

.getElementById("checkout-form")

.addEventListener(

"submit",

function(e){


e.preventDefault();



let email =

document.getElementById("email").value;



let address =

document.getElementById("address").value;



let selected =

deliverySelect.options[

deliverySelect.selectedIndex

];


let delivery =

selected.value;


let deliveryFee =

parseInt(

selected.dataset.fee

)||0;


let totalPayable =

cartTotal + deliveryFee;



let handler =

PaystackPop.setup({


key:

"pk_live_c83beeb26fc63993672d7cb37024b5f5ae42600d",


email:

email,


amount:

totalPayable*100,


currency:

"NGN",


ref:

"SAVAGE_"+Math.floor(

Math.random()*1000000000

),



callback:function(response){


alert(

"Payment Successful!"

);



emailjs.send(

"service_0amy9d5",

"template_0oza028",

{


customer_email:

email,


address:

address,


delivery:

delivery,


cart:

JSON.stringify(cart),


total:

totalPayable,


reference:

response.reference


}


).then(()=>{


console.log(

"Order sent to email"

);


});



localStorage.removeItem(

"cart"

);



window.location.href=

"index.html";


},



onClose:function(){


alert(

"Payment cancelled"

);


}


});


handler.openIframe();


});


updateTotal();


</script>


</body>

</html>
